# mo_test host profile.
# Format rules: cppstyle 0.1.0-rc.1 clang-format adapter support.
# Analyzer (P4 Phase A): bugprone minimal import from UMI host profile.
# Analyzer (P4b Phase B): cppcore phase import — from UMI host profile
# (profiles/projects/umi/host.toml): bounds-array-to-pointer-decay /
# owning-memory / special-member-functions / macro-usage at warning severity.
# Analyzer (P4b Phase C step1): modernize.all at warning severity — mirrors UMI
# host profile exclusion list: use-trailing-return-type / use-std-print /
# return-braced-init-list are excluded as over-aggressive for this codebase.
# naming / readability / performance are deferred to Phase C step2+ (high
# finding volume; imported separately to allow focused burndown).
# Analyzer (Track F-rollout): FW_ and BUILD_ prefixes removed from
# AllowedRegexp — all FW_/BUILD_ macros have been eliminated from mo_test
# source (confirmed 0 occurrences via git grep). RAMFUNC is retained because
# it is actively used in flash_ram.cc (section-attribute macro, cannot be
# replaced with constexpr).
# macro-usage AllowedRegexp covers: UMI_ (UMI framework) / G3N3_ (board
# firmware) / RAMFUNC (RAM-resident flash driver functions).
# UMI-side cppcore.pro-type-member-init / const-cast intentionally excluded.
# Legacy .clang-format options without adapter mapping (AlignConsecutiveMacros,
# TypenameMacros, BasedOnStyle, etc.) are intentionally omitted until cppstyle
# gains the corresponding cpp.format.* rules.

extends = []

[scan]
header_filter_regex = "^(packages|platforms|tools)/.*"
system_headers = false

[rules."cpp.bugprone.all"]
enabled = true
severity = "error"
warnings_as_errors = true
[rules."cpp.bugprone.all".options]
disabled_checks = ["bugprone-easily-swappable-parameters"]

[rules."cpp.cppcore.bounds-array-to-pointer-decay"]
enabled = true
severity = "warning"

[rules."cpp.cppcore.owning-memory"]
enabled = true
severity = "warning"

[rules."cpp.cppcore.special-member-functions"]
enabled = true
severity = "warning"

[rules."cpp.cppcore.macro-usage"]
enabled = true
severity = "warning"
[rules."cpp.cppcore.macro-usage".options]
check_options = { AllowedRegexp = "^(UMI_|G3N3_|RAMFUNC).*" }

[rules."cpp.modernize.all"]
enabled = true
severity = "warning"
[rules."cpp.modernize.all".options]
disabled_checks = [
  "modernize-use-trailing-return-type",
  "modernize-use-std-print",
  "modernize-return-braced-init-list",
]

[rules."cpp.format.column-limit"]
[rules."cpp.format.column-limit".options]
value = 0

[rules."cpp.format.pointer-alignment"]
[rules."cpp.format.pointer-alignment".options]
value = "Left"

[rules."cpp.format.derive-pointer-alignment"]
[rules."cpp.format.derive-pointer-alignment".options]
value = false

[rules."cpp.format.bin-pack-parameters"]
[rules."cpp.format.bin-pack-parameters".options]
value = false

[rules."cpp.format.short-functions-on-single-line"]
[rules."cpp.format.short-functions-on-single-line".options]
value = "All"

[rules."cpp.format.template-decl-on-own-line"]
[rules."cpp.format.template-decl-on-own-line".options]
value = "No"

[rules."cpp.format.include-blocks"]
[rules."cpp.format.include-blocks".options]
value = "Preserve"
