# mo_test host profile (format-only).
# Rules are limited to cppstyle 0.1.0-rc.1 clang-format adapter support.
# Legacy .clang-format options without adapter mapping (AlignConsecutiveMacros,
# TypenameMacros, BasedOnStyle, etc.) are intentionally omitted until cppstyle
# gains the corresponding cpp.format.* rules.

extends = []

[rules."cpp.format.column-limit"]
[rules."cpp.format.column-limit".options]
value = 0

[rules."cpp.format.pointer-alignment"]
[rules."cpp.format.pointer-alignment".options]
value = "Left"

[rules."cpp.format.derive-pointer-alignment"]
[rules."cpp.format.derive-pointer-alignment".options]
value = false

[rules."cpp.format.bin-pack-parameters"]
[rules."cpp.format.bin-pack-parameters".options]
value = false

[rules."cpp.format.short-functions-on-single-line"]
[rules."cpp.format.short-functions-on-single-line".options]
value = "All"

[rules."cpp.format.template-decl-on-own-line"]
[rules."cpp.format.template-decl-on-own-line".options]
value = "No"

[rules."cpp.format.include-blocks"]
[rules."cpp.format.include-blocks".options]
value = "Preserve"
