# Generated by `cppstyle init --import`.
# Edit freely; this is your project's profile entry point.

extends = []

[scan]
header_filter_regex = "^(packages|platforms|examples|tests|web)/.*"
system_headers = false

[rules."cpp.analyzer.all"]
enabled = true
severity = "error"
warnings_as_errors = true

[rules."cpp.bugprone.all"]
enabled = true
severity = "error"
warnings_as_errors = true
[rules."cpp.bugprone.all".options]
disabled_checks = ["bugprone-easily-swappable-parameters"]

[rules."cpp.cppcore.bounds-array-to-pointer-decay"]
enabled = true
severity = "warning"

[rules."cpp.cppcore.macro-usage"]
enabled = true
severity = "warning"
[rules."cpp.cppcore.macro-usage".options]
check_options = { AllowedRegexp = "^UMI_.*" }

[rules."cpp.cppcore.owning-memory"]
enabled = true
severity = "warning"

[rules."cpp.cppcore.special-member-functions"]
enabled = true
severity = "warning"

[rules."cpp.format.bin-pack-arguments"]
[rules."cpp.format.bin-pack-arguments".options]
value = false

[rules."cpp.format.bin-pack-parameters"]
[rules."cpp.format.bin-pack-parameters".options]
value = false

[rules."cpp.format.column-limit"]
[rules."cpp.format.column-limit".options]
value = 120

[rules."cpp.format.derive-pointer-alignment"]
[rules."cpp.format.derive-pointer-alignment".options]
value = false

[rules."cpp.format.include-blocks"]
[rules."cpp.format.include-blocks".options]
value = "Regroup"

[rules."cpp.format.include-order"]
[rules."cpp.format.include-order".options]
groups = [{ priority = 1, regex = '^<.*\.h>' }, { priority = 2, regex = "^<[a-z0-9_]+>$" }, { priority = 3, regex = "^<umicore/" }, { priority = 4, regex = "^<umi[a-z]+/" }, { priority = 5, regex = "^\".*\"" }]

[rules."cpp.format.indent-width"]
[rules."cpp.format.indent-width".options]
value = 4

[rules."cpp.format.insert-braces"]
[rules."cpp.format.insert-braces".options]
value = true

[rules."cpp.format.insert-newline-at-eof"]
[rules."cpp.format.insert-newline-at-eof".options]
value = true

[rules."cpp.format.pointer-alignment"]
[rules."cpp.format.pointer-alignment".options]
value = "Left"

[rules."cpp.format.reference-alignment"]
[rules."cpp.format.reference-alignment".options]
value = "Left"

[rules."cpp.format.remove-semicolon"]
[rules."cpp.format.remove-semicolon".options]
value = true

[rules."cpp.format.short-functions-on-single-line"]
[rules."cpp.format.short-functions-on-single-line".options]
value = "Inline"

[rules."cpp.format.template-decl-on-own-line"]
[rules."cpp.format.template-decl-on-own-line".options]
value = "Yes"

[rules."cpp.misc.all"]
enabled = true
severity = "warning"
[rules."cpp.misc.all".options]
disabled_checks = ["misc-non-private-member-variables-in-classes", "misc-use-internal-linkage"]

[rules."cpp.modernize.all"]
enabled = true
severity = "warning"
[rules."cpp.modernize.all".options]
disabled_checks = ["modernize-use-trailing-return-type", "modernize-use-std-print", "modernize-return-braced-init-list"]

[rules."cpp.naming.identifiers"]
enabled = true
[rules."cpp.naming.identifiers".options]
check_options = { ClassCase = "CamelCase", ConceptCase = "CamelCase", ConstexprVariableCase = "lower_case", EnumCase = "CamelCase", EnumConstantCase = "UPPER_CASE", FunctionCase = "lower_case", GlobalVariableCase = "lower_case", MemberCase = "lower_case", MethodCase = "lower_case", MethodIgnoredRegexp = "^(operator|~).*", NamespaceCase = "lower_case", ParameterCase = "lower_case", ScopedEnumConstantCase = "UPPER_CASE", StaticVariableCase = "lower_case", StructCase = "CamelCase", StructIgnoredRegexp = "^([A-Z][A-Z0-9_]*|promise_type|.*_t)$", TypeAliasCase = "CamelCase", TypeAliasIgnoredRegexp = "^([A-Z][A-Z0-9_]*|.*_t|type|value_type)$", TypeCase = "CamelCase", VariableCase = "lower_case" }

[rules."cpp.performance.all"]
enabled = true
severity = "warning"

[rules."cpp.performance.move-const-arg"]
enabled = true
severity = "error"
warnings_as_errors = true

[rules."cpp.performance.unnecessary-value-param"]
enabled = true
severity = "error"
warnings_as_errors = true

[rules."cpp.readability.all"]
enabled = true
severity = "warning"
[rules."cpp.readability.all".options]
disabled_checks = ["readability-convert-member-functions-to-static", "readability-magic-numbers", "readability-identifier-length"]

